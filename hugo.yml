baseURL: "https://aasd9022.github.io/"
languageCode: "zh-CN"
locale: "zh-CN"
title: "我的技术博客"
theme: ["PaperMod"]
canonifyURLs: true

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

author:
  name: "aasd9022"
  email: ""

params:
  mainSections:
    - posts

  comments: true
  defaultTheme: light
  ShowToc: true
  TocOpen: false
  ShowReadingTime: true
  ShowWordCount: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowLastMod: true
  VisitCount: true
  ShowShareButtons: true
  ShowRelatedPosts: true

  disableThemeToggle: true
  disableScrollToTop: true

  label:
    text: "我的技术博客"

  homeInfoParams:
    Title: "欢迎来到我的博客"
    Content: "在这里分享技术心得、编程经验和生活感悟"

  editPost:
    URL: "https://github.com/aasd9022/aasd9022.github.io/edit/main/content/posts"
    Text: "编辑文章"
    appendFilePath: true

menu:
  main:
    - name: 首页
      url: /
      weight: 1
    - name: 归档
      url: /archives/
      weight: 2
    - name: 标签
      url: /tags/
      weight: 3
    - name: 搜索
      url: /search/
      weight: 4

comments:
  utterances:
    repo: aasd9022/aasd9022.github.io
    issueTerm: pathname
    theme: github-light

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  home:
    - HTML
    - RSS