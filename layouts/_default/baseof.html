<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; }
        header { border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        nav { margin-top: 10px; }
        nav a { margin-right: 20px; text-decoration: none; color: #666; }
        nav a:hover { color: #000; }
        footer { border-top: 1px solid #eee; padding-top: 20px; margin-top: 40px; color: #888; font-size: 14px; }
        .post-list { list-style: none; padding: 0; }
        .post-item { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
        .post-title { font-size: 20px; margin-bottom: 5px; }
        .post-title a { text-decoration: none; color: #000; }
        .post-meta { color: #888; font-size: 14px; }
        .post-content { line-height: 1.6; }
        .tags { margin-top: 10px; }
        .tag { display: inline-block; background: #f0f0f0; padding: 3px 8px; border-radius: 3px; font-size: 12px; margin-right: 5px; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="text-decoration: none; color: #000;">{{ .Site.Title }}</a></h1>
        <nav>
            {{ range .Site.Menus.main }}
                <a href="{{ .URL }}">{{ .Name }}</a>
            {{ end }}
        </nav>
    </header>
    <main>
        {{ block "main" . }}{{ end }}
    </main>
    <footer>
        <p>&copy; {{ now.Year }}. All rights reserved.</p>
    </footer>
</body>
</html>
