{{ define "main" }}
<article>
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
        {{ .Date.Format "2006-01-02" }} | {{ .ReadingTime }} min read | {{ .WordCount }} words
    </div>
    {{ if .Params.tags }}
    <div class="tags">
        {{ range .Params.tags }}
            <span class="tag">#{{ . }}</span>
        {{ end }}
    </div>
    {{ end }}
    <div class="post-content">
        {{ .Content }}
    </div>
</article>
{{ end }}
